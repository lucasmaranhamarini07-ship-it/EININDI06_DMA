[data]
kitId=2

[env:esp32dev]
platform = espressif32 @ ^6.0.0 ;Arduino-ESP32 v3.x | timerBegin(freq) API + IDF v5
board = esp32dev ;Para ESP32, use esse board e deixe as flags USB comentadas:
; board = esp32-s3-devkitc-1 ;Para ESP32-S3, troque esse board e descomente as flags USB:
framework = arduino
monitor_speed = 115200
; upload_protocol = espota ;Caso use OTA
; upload_port = iikit${data.kitId}.local ;Caso use OTA
build_src_filter = +<esp1.cpp>
build_flags =
    -DKIT_ID=${data.kitId}
    -DKIT_HOSTNAME='"iikit${data.kitId}"'
    ; -DARDUINO_USB_MODE=1 ;caso use ESP32-S3 e queira usar a porta USB para comunicação serial, descomente esta linha
    ; -DARDUINO_USB_CDC_ON_BOOT=1 ;caso use ESP32-S3 e queira usar a porta USB para comunicação serial, descomente esta linha
lib_deps =
    adafruit/Adafruit ADS1X15 @ ^2.5.0
    adafruit/Adafruit SSD1306 @ ^2.5.0
    adafruit/Adafruit GFX Library @ ^1.11.0
    adafruit/Adafruit BusIO @ ^1.16.0
    tzapu/WiFiManager @ ^2.0.0

; ── ESP32 + ADS1115 por interrupção de timer ─────────────────────────────────
; Compila apenas src/interrupt.cpp. Timer de hardware a 20 Hz acorda a CPU
; a cada 50 ms para leitura do ADS1115 e envio via UDP (wserial).
[env:esp32dev-irq]
platform = espressif32 @ ^6.0.0
board = esp32dev
framework = arduino
monitor_speed = 115200
; upload_protocol = espota
; upload_port = iikit${data.kitId}.local
build_src_filter = +<interrupt.cpp>
build_flags =
    -DKIT_ID=${data.kitId}
    -DKIT_HOSTNAME='"iikit${data.kitId}"'
lib_deps =
    adafruit/Adafruit ADS1X15 @ ^2.5.0
    adafruit/Adafruit SSD1306 @ ^2.5.0
    adafruit/Adafruit GFX Library @ ^1.11.0
    adafruit/Adafruit BusIO @ ^1.16.0
    tzapu/WiFiManager @ ^2.0.0

; ── ESP32-S3 + ADC DMA ────────────────────────────────────────────────────────
; Compila apenas src/dma.cpp. Usa o driver adc_continuous do ESP-IDF v5.
; Para gravar via USB native do S3: descomente as flags ARDUINO_USB_*.
[env:esp32s3-dma]
platform = espressif32 @ ^6.0.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; upload_protocol = espota
; upload_port = iikit-dma.local
build_src_filter = +<dma.cpp>
build_flags =
    -DKIT_ID=0
    -DKIT_HOSTNAME='"iikit-dma"'
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    adafruit/Adafruit ADS1X15 @ ^2.5.0
    adafruit/Adafruit SSD1306 @ ^2.5.0
    adafruit/Adafruit GFX Library @ ^1.11.0
    adafruit/Adafruit BusIO @ ^1.16.0
    tzapu/WiFiManager @ ^2.0.0


